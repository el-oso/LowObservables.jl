name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ["1.12"]
        os: [ubuntu-latest]
        include:
          - version: "1.12"
            os: macOS-latest
          - version: "1.12"
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - name: Install test dependencies
        run: julia --project=test -e 'import Pkg; Pkg.instantiate()'
      - name: Run tests
        run: julia --project=test --code-coverage=user test/runtests.jl
        env:
          JULIA_NUM_THREADS: 2
      - uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          fail-on-error: false

  # NOTE: docs are built and deployed by Documentation.yml only.
  # Do NOT add a docs job here — two workflows pushing to gh-pages race.
